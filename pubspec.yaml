name: alburdat_dashboard
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  mqtt_client: ^10.11.9
  provider: ^6.1.1
  google_fonts: ^8.0.2

  http: ^1.2.2
  supabase_flutter: ^2.4.0
  mobile_scanner: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true # true untuk membuat icon Android
  ios: true # true untuk membuat icon iOS
  image_path: "assets/icon/icon.png" # path ke gambar logo utama Anda
  adaptive_icon_background: "#FFFFFF" # warna background untuk icon adaptive Android
  adaptive_icon_foreground: "assets/icon/icon.png" # gambar untuk foreground icon adaptive

